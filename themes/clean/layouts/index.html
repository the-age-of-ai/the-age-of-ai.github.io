{{ define "main" }}
  <section class="hero">
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
  </section>
  <section class="posts">
    <h2>Latest Reviews</h2>
    <div class="post-list">
      {{ range first 20 .Site.RegularPages.ByDate.Reverse }}
      <article class="post-card">
        <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <p class="meta">{{ .Date.Format "January 2, 2006" }} · by {{ $.Site.Params.author }}</p>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
      </article>
      {{ end }}
    </div>
  </section>
{{ end }}
